<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYGNUS Automation Duo Pack</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            --glow-color: rgba(139, 92, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glowing orbs for depth */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: 20%; left: 25%; }
        body::after { bottom: 20%; right: 25%; }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #f8fafc;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Dark Glassmorphism Anchor Buttons */
        .glass-btn {
            display: inline-block;
            text-decoration: none;
            padding: 1.1rem 2rem;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0px rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        /* Subtle reflection line */
        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        /* Hover states */
        .glass-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4),
                        0 0 15px var(--glow-color),
                        inset 0 1px 0px rgba(255, 255, 255, 0.1);
        }

        /* Primary action accent variant */
        .glass-btn.primary {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.25);
        }

        .glass-btn.primary:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.45);
            --glow-color: rgba(139, 92, 246, 0.5);
        }

        .glass-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cygnus</h1>
        <div class="subtitle">Automation Duo Pack</div>
        
        <div class="button-group">
            <a href="#deploy" class="glass-btn primary">Deploy Core Engine</a>
            <a href="#configure" class="glass-btn">Configure Modules</a>
        </div>
    </div>

</body>
</html>
